apiVersion: v1
kind: Secret
metadata:
  name: haproxy-config
  namespace: haproxy
type: Opaque
stringData:
  haproxy.cfg: |
    global
        log stdout format raw local0

    defaults
        mode http
        log global
        option httplog
        option dontlognull
        timeout connect 5s
        timeout client  30s
        timeout server  30s

    frontend http_front
        bind *:8080
        default_backend app_back

    backend app_back
        http-request return status 200 content-type text/plain string "Hello from HAProxy on Kubernetes"
